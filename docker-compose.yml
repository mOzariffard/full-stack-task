version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: drop_system_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: drop_user
      POSTGRES_PASSWORD: drop_pass
      POSTGRES_DB: drop_system
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U drop_user -d drop_system']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drop_system_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://drop_user:drop_pass@postgres:5432/drop_system
      JWT_SECRET: super-secret-jwt-key-change-in-production-at-least-32-chars
      JWT_EXPIRES_IN: 7d
      RESERVATION_TTL_MINUTES: 5
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
    ports:
      - '4000:4000'

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drop_system_ui
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
